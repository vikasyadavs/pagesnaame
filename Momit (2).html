    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap');

        :root {
            --primary: #1b3b2b; /* Deep Forest Green */
            --primary-light: #2d5a43;
            --accent: #d4af37; /* Warm Amber Gold */
            --accent-hover: #bda02b;
            --bg-base: #faf8f5; /* Off-white background */
            --bg-card: #ffffff;
            --text-dark: #222c26;
            --text-muted: #606c64;
            --font-display: 'Playfair Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-dark);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .section-padding {
            padding: 100px 0;
        }

        .text-center { 
            text-align: center; 
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: 700;
        }

        h2 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .section-desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 50px auto;
        }

        /* Sticky Header */
        header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            z-index: 1000;
            transition: var(--transition);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .logo span { 
            color: var(--accent); 
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover { 
            color: var(--accent); 
        }
        
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .menu-toggle span {
            width: 28px;
            height: 3px;
            background-color: var(--primary);
            border-radius: 2px;
            transition: var(--transition);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, rgba(27, 59, 43, 0.95), rgba(45, 90, 67, 0.9)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            color: #ffffff;
            padding: 140px 0 120px 0;
            position: relative;
        }

        .badge {
            background-color: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 24px;
            animation: pulse 2s infinite alternate;
        }

        .hero h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.25rem;
            max-width: 600px;
            margin: 0 auto 40px auto;
            color: #e0e6e2;
        }

        .cta-btn {
            background-color: var(--accent);
            color: var(--primary);
            padding: 14px 32px;
            border-radius: 4px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }

        .cta-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* Scroll Animation Setup */
        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            visibility: hidden;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, transform;
        }

        .fade-in-section.is-visible {
            opacity: 1;
            transform: none;
            visibility: visible;
        }

        /* 2. Work History Section */
        .editorial-section { 
            background-color: #ffffff; 
        }

        .timeline {
            position: relative;
            max-width: 900px;
            margin: 50px auto 0 auto;
        }

        .timeline::after {
            content: '';
            position: absolute;
            width: 2px;
            background-color: var(--accent);
            top: 0; bottom: 0; left: 50%;
            margin-left: -1px;
        }

        .timeline-item {
            padding: 10px 40px;
            position: relative;
            width: 50%;
            box-sizing: border-box;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            right: -8px;
            background-color: var(--bg-base);
            border: 3px solid var(--primary);
            top: 15px;
            border-radius: 50%;
            z-index: 1;
        }

        .left { left: 0; text-align: right; }
        .right { left: 50%; }
        .right::after { left: -8px; }

        .timeline-card {
            padding: 24px;
            background: var(--bg-base);
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border-top: 3px solid var(--primary);
        }

        .timeline-card h3 {
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        /* 3. Job History */
        .history-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .history-text blockquote {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-style: italic;
            border-left: 4px solid var(--accent);
            padding-left: 20px;
            margin: 24px 0;
            color: var(--primary);
        }

        /* 4. Current Job Market */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .market-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #eee;
            transition: var(--transition);
        }

        .market-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(27, 59, 43, 0.08);
        }

        .market-icon {
            font-size: 2rem;
            margin-bottom: 15px;
            display: inline-block;
        }

        .market-card h3 {
            font-size: 1.25rem;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .demand-container {
            margin-top: 15px;
        }

        .demand-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .demand-bar {
            height: 6px;
            background-color: #eef2f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .demand-fill {
            height: 100%;
            background-color: var(--accent);
            border-radius: 3px;
        }

        /* 5. Top Companies */
        .companies-section { 
            background-color: #ffffff; 
        }

        .companies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .company-card {
            display: flex;
            gap: 20px;
            padding: 24px;
            border: 1px solid #eaeaea;
            border-radius: 6px;
            align-items: center;
            transition: var(--transition);
        }

        .company-card:hover {
            border-color: var(--primary);
            background-color: var(--bg-base);
        }

        .company-logo-placeholder {
            width: 60px;
            height: 60px;
            background-color: var(--primary);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .company-info h3 {
            font-size: 1.15rem;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .company-sector {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .company-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 6. Application Form */
        .form-section {
            background: linear-gradient(180deg, var(--bg-base) 0%, #eef2f0 100%);
        }

        .form-container {
            max-width: 650px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(27, 59, 43, 0.1);
            border-top: 4px solid var(--accent);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .input-wrapper {
            position: relative;
        }

        .prefix-addon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            font-family: var(--font-body);
            font-size: 1rem;
            border: 1px solid #cccccc;
            border-radius: 4px;
            background-color: #fafafa;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(27, 59, 43, 0.1);
        }

        .form-control.has-prefix {
            padding-left: 52px;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 700;
            padding: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background-color: var(--primary-light);
            box-shadow: 0 5px 15px rgba(27, 59, 43, 0.2);
        }
        
        .error-msg {
            color: #c0392b;
            font-size: 0.85rem;
            margin-top: 4px;
            display: none;
        }

        .form-control.invalid {
            border-color: #c0392b;
            background-color: #fdf2f2;
        }

        .success-box {
            display: none;
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #2e7d32;
            padding: 24px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 24px;
        }

        .success-box h3 { 
            font-family: var(--font-body); 
            font-size: 1.3rem; 
            margin-bottom: 8px;
        }

        /* 7. Footer */
        footer {
            background-color: var(--primary);
            color: #ffffff;
            padding: 60px 0 30px 0;
            border-top: 4px solid var(--accent);
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .footer-brand .logo {
            color: #ffffff;
        }

        .footer-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .footer-links a {
            color: #c8d1cc;
            text-decoration: none;
            transition: var(--transition);
        }

        .footer-links a:hover {
            color: var(--accent);
        }

        .copyright {
            text-align: center;
            font-size: 0.9rem;
            color: #9cb0a5;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            100% { box-shadow: 0 0 0
