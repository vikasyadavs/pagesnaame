    <style>
        /* Typography Architecture */
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..1000;1,9..40,300..1000&family=DM+Serif+Display:ital,wght@0,400;1,400&display=swap');

        /* Custom Editorial Palette */
        :root {
            --primary-color: #0c2b21; /* Rich Forest Green */
            --primary-light: #194738;
            --accent-color: #e5a93b; /* Warm Amber Gold */
            --accent-hover: #cb922a;
            --bg-color: #fcfaf5; /* Warm Off-White Matte */
            --card-bg: #ffffff;
            --text-main: #2b322e;
            --text-muted: #5c6661;
            --font-display: 'DM Serif Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Base Resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3 {
            font-family: var(--font-display);
            color: var(--primary-color);
            font-weight: 400;
        }

        /* Sticky Navigation */
        header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 25px rgba(12, 43, 33, 0.03);
            z-index: 1000;
            border-bottom: 1px solid rgba(12, 43, 33, 0.05);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
        }
        .logo {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 400;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: var(--accent-color);
        }
        nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }
        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        nav a:hover {
            color: var(--accent-color);
        }
        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.6rem;
            color: var(--primary-color);
            cursor: pointer;
        }

        /* Atmospheric Regional Hero Section */
        .hero {
            background: linear-gradient(135deg, rgba(12, 43, 33, 0.98) 0%, rgba(25, 71, 56, 0.94) 100%), 
                        radial-gradient(circle at 80% 30%, rgba(229, 169, 59, 0.15) 0%, transparent 60%);
            color: #ffffff;
            padding: 9.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.03;
            background-image: radial-gradient(var(--accent-color) 1.5px, transparent 0);
            background-size: 24px 24px;
            pointer-events: none;
        }
        .badge {
            display: inline-block;
            background-color: rgba(229, 169, 59, 0.12);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.45rem 1.6rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse-badge 3s infinite ease-in-out;
        }
        .hero h1 {
            color: #ffffff;
            font-size: 4.2rem;
            margin-bottom: 1.2rem;
            line-height: 1.15;
            letter-spacing: -0.5px;
        }
        .hero p {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.85);
            max-width: 750px;
            margin: 0 auto 3rem;
            font-weight: 300;
        }
        .hero-btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--primary-color);
            text-decoration: none;
            padding: 1rem 2.6rem;
            border-radius: 4px;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 4px 18px rgba(229, 169, 59, 0.25);
        }
        .hero-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(229, 169, 59, 0.35);
        }

        /* Layout Framework & Fade-In Animations */
        section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 7.5rem 2rem;
            opacity: 0;
            transform: translateY(35px);
            transition: opacity 0.85s cubic-bezier(0.16, 1, 0.3, 1), transform 0.85s cubic-bezier(0.16, 1, 0.3, 1);
        }
        section.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .section-header {
            text-align: center;
            margin-bottom: 5rem;
        }
        .section-header h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
            letter-spacing: -0.5px;
        }
        .section-header h2::after {
            content: '';
            display: block;
            width: 55px;
            height: 3px;
            background-color: var(--accent-color);
            margin: 0.8rem auto 0;
        }
        .section-header p {
            color: var(--text-muted);
            font-size: 1.25rem;
            font-weight: 300;
        }

        /* Historical Grid Architecture */
        .history-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4.5rem;
        }
        .history-card {
            background: var(--card-bg);
            padding: 3.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(12, 43, 33, 0.02);
            border-top: 4px solid var(--primary-color);
            transition: var(--transition);
        }
        .history-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 45px rgba(12, 43, 33, 0.06);
        }
        .history-card h3 {
            font-size: 2rem;
            margin-bottom: 1.4rem;
            letter-spacing: -0.3px;
        }
        .history-card p {
            margin-bottom: 1.4rem;
            color: var(--text-main);
            text-align: justify;
        }
        .history-card ul {
            padding-left: 1.5rem;
            color: var(--text-muted);
        }
        .history-card li {
            margin-bottom: 0.8rem;
        }

        /* Sector Demand Grid */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 2.2rem;
        }
        .sector-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.01);
            border: 1px solid rgba(12, 43, 33, 0.04);
            transition: var(--transition);
        }
        .sector-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 22px 45px rgba(12, 43, 33, 0.06);
            border-color: rgba(229, 169, 59, 0.3);
        }
        .sector-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }
        .sector-card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.9rem;
            font-family: var(--font-body);
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .demand-container {
            margin-top: 1.5rem;
        }
        .demand-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }
        .demand-bar {
            height: 7px;
            background-color: #ebf0ee;
            border-radius: 10px;
            overflow: hidden;
        }
        .demand-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--accent-color));
            border-radius: 10px;
        }

        /* Corporate Matrix Layout */
        .companies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 2.2rem;
        }
        .company-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 8px;
            display: flex;
            gap: 1.8rem;
            align-items: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.01);
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .company-card:hover {
            border-color: rgba(229, 169, 59, 0.2);
            box-shadow: 0 15px 35px rgba(12, 43, 33, 0.06);
        }
        .company-logo-placeholder {
            width: 70px;
            height: 70px;
            background-color: var(--primary-color);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: bold;
            border-radius: 8px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(12, 43, 33, 0.1);
        }
        .company-info h3 {
            font-size: 1.4rem;
            font-family: var(--font-body);
            font-weight: 700;
            margin-bottom: 0.3rem;
            letter-spacing: -0.3px;
        }
        .company-sector {
            font-size: 0.8rem;
            background-color: #eef3f0;
            color: var(--primary-light);
            padding: 0.2rem 0.7rem;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 0.6rem;
            font-weight: 600;
        }
        .company-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* Centered Application Form Profile Console */
        .form-section {
            background-color: #eae5db;
            max-width: 860px;
            margin: 5rem auto;
            padding: 5rem 4.5rem;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(12, 43, 33, 0.04);
            border: 1px solid rgba(12, 43, 33, 0.02);
        }
        .application-form {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--primary-color);
        }
        .form-group input, .form-group textarea {
            padding: 1rem 1.2rem;
            border: 1px solid rgba(12, 43, 33, 0.15);
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 1rem;
            background-color: #ffffff;
            transition: var(--transition);
            color: var(--text-main);
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(12, 43, 33, 0.06);
        }
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border: 1px solid rgba(12, 43, 33, 0.15);
            border-radius: 4px;
        }
        .phone-prefix {
            padding: 1rem 0 1rem 1.2rem;
            color: var(--text-muted);
            font-weight: 600;
            user-select: none;
        }
        .phone-input-wrapper input {
            border: none;
            width: 100%;
        }
        .phone-input-wrapper input:focus {
            box-shadow: none;
        }
        .phone-input-wrapper:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(12, 43, 33, 0.06);
        }
        .submit-btn {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 1.2rem 2.6rem;
            font-size: 1.1rem;
            font-family: var(--font-body);
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            box-shadow: 0 4px 15px rgba(12, 43, 33, 0.15);
        }
        .submit-btn:hover {
            background-color: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(12, 43, 33, 0.25);
        }
        .error-msg {
            color: #922323;
            font-size: 0.85rem;
            margin-top: -0.3rem;
            display: none;
            font-weight: 500;
        }
        .success-banner {
            display: none;
            background-color: #d1e7dd;
            color: #0f5132;
            padding: 1.5rem;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 2.5rem;
            font-size: 1.2rem;
            border: 1px solid #badbcc;
        }

        /* Subtle Section Horizontal Break lines */
        hr {
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, rgba(12, 43, 33, 0), rgba(12, 43, 33, 0.08), rgba(12, 43, 33, 0));
            max-width: 80%;
            margin: 0 auto;
        }

        /* Editorial Branding Footer System */
        footer {
            background-color: var(--primary-color);
            color: rgba(255, 255, 255, 0.7);
            padding: 5.5rem 2rem 3rem;
            margin-top: 6rem;
            border-top: 3px solid var(--accent-color);
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2.5rem;
            padding-bottom: 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .footer-brand h3 {
            color: #ffffff;
            font-size: 1.8rem;
            margin-bottom: 0.6rem;
            letter-spacing: -0.5px;
        }
        .footer-brand span {
            color: var(--accent-color);
        }
        .footer-links {
            display: flex;
            gap: 3rem;
        }
        .footer-links a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.95rem;
        }
        .footer-links a:hover {
            color: var(--accent-color);
        }
        .copyright {
            text-align: center;
            max-width: 1200px;
            margin: 3rem auto 0;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Pulse Badge Animations */
        @keyframes pulse-badge {
            0% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 0.95; }
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .nav-container { padding: 1.2rem 1.5rem; }
            nav {
                display: none;
                position: absolute;
                top: 100%; left: 0; right: 0;
                background: #ffffff;
                padding: 2rem;
                box-shadow: 0 15px 35px rgba(12, 43, 33, 0.08);
                border-top: 1px solid rgba(12, 43, 33, 0.05);
            }
            nav.active { display: block; }
            nav ul { flex-direction: column; gap: 1.4rem; }
            .mobile-toggle { display: block; }
            .hero h1 { font-size: 2.8rem; }
            .hero p { font-size: 1.2rem; }
            .history-grid { grid-template-columns: 1fr; gap: 2.5rem; }
            .form-section { padding: 3rem 1.5rem; }
            .footer-content { flex-direction: column; text-align: center; }
            .footer-links { flex-direction: column; gap: 1.4rem; align-items: center; }
        }
    </style>
</head>

    <section class="hero" style="opacity:1; transform:none; max-width:100%; padding:
