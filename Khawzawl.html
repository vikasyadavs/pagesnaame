    <style>
        /* Typography Architecture */
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap');

        /* Color Palette & Custom System Design Variables */
        :root {
            --primary-color: #0d1e2d; /* Deep Editorial Corporate Navy */
            --accent-color: #dca134;  /* Warm Professional Amber/Gold Accent */
            --accent-hover: #c48e28;
            --bg-base: #faf9f5;        /* Soft Off-White Background */
            --surface-card: #ffffff;
            --text-dark: #16222b;     /* High Contrast Text */
            --text-muted: #54626f;
            --font-display: 'DM Serif Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --max-width: 1200px;
        }

        /* Basic Resets */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-base);
            color: var(--text-dark);
            line-height: 1.7;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Sticky Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: rgba(13, 30, 45, 0.98);
            backdrop-filter: blur(12px);
            padding: 16px 0;
            border-bottom: 1px solid rgba(220, 161, 52, 0.15);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-link {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-color);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 26px;
        }

        .nav-links a {
            color: #faf9f5;
            text-decoration: none;
            font-size: 0.94rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background-color: #faf9f5;
            border-radius: 1px;
        }

        /* 1. Hero Section */
        .hero {
            background: linear-gradient(135deg, #050d14 0%, #152d42 100%);
            color: #faf9f5;
            padding: 120px 0 140px 0;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(220, 161, 52, 0.08) 0%, transparent 65%);
            pointer-events: none;
        }

        .badge {
            display: inline-block;
            background-color: rgba(220, 161, 52, 0.12);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.84rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 26px;
            animation: pulseFade 3s infinite ease-in-out;
        }

        @keyframes pulseFade {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            line-height: 1.15;
            margin-bottom: 18px;
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 750px;
            margin: 0 auto 38px auto;
            color: #adc3d5;
        }

        .cta-btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--primary-color);
            padding: 16px 38px;
            border-radius: 4px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 14px rgba(220, 161, 52, 0.2);
        }

        .cta-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 161, 52, 0.3);
        }

        /* Structuring Global Sections */
        section {
            padding: 100px 0;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 2.6rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 55px;
            height: 3px;
            background-color: var(--accent-color);
            margin: 16px auto 0 auto;
        }

        /* 2. Work History Section */
        .history-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .history-card {
            background-color: var(--surface-card);
            padding: 38px;
            border-radius: 6px;
            box-shadow: 0 4px 22px rgba(13, 30, 45, 0.02);
            border-top: 4px solid var(--primary-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .history-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(13, 30, 45, 0.06);
        }

        .history-card h3 {
            font-family: var(--font-display);
            font-size: 1.45rem;
            color: var(--primary-color);
            margin-bottom: 16px;
        }

        /* 3. Job History Section */
        .evolution-wrapper {
            background-color: #e5dac6;
        }

        .timeline {
            max-width: 850px;
            margin: 0 auto;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 30px;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: var(--primary-color);
            opacity: 0.15;
        }

        .timeline-item {
            position: relative;
            padding-left: 72px;
            margin-bottom: 44px;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-node {
            position: absolute;
            left: 21px;
            top: 6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: var(--accent-color);
            border: 4px solid #e5dac6;
            z-index: 2;
        }

        .timeline-panel {
            background-color: var(--surface-card);
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.01);
        }

        .timeline-year {
            font-weight: 700;
            color: var(--accent-color);
            font-size: 1.15rem;
            margin-bottom: 4px;
        }

        .timeline-panel h4 {
            font-family: var(--font-display);
            font-size: 1.35rem;
            color: var(--primary-color);
            margin-bottom: 12px;
        }

        /* 4. Current Job Market Section */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 26px;
        }

        .market-card {
            background-color: var(--surface-card);
            padding: 28px;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.01);
            border: 1px solid rgba(13, 30, 45, 0.04);
        }

        .market-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .market-icon {
            font-size: 1.6rem;
            background-color: #e5dac6;
            padding: 6px 12px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .market-header h3 {
            font-size: 1.2rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        .demand-metrics {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .demand-track {
            width: 100%;
            height: 8px;
            background-color: #cfc2ac;
            border-radius: 4px;
            overflow: hidden;
        }

        .demand-fill {
            height: 100%;
            background-color: var(--primary-color);
            border-radius: 4px;
        }

        .demand-fill.peak {
            background-color: #b77f18;
        }

        /* 5. Top Companies Section */
        .companies-wrapper {
            background-color: #e5dac6;
        }

        .companies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 26px;
        }

        .company-card {
            background-color: var(--surface-card);
            padding: 30px;
            border-radius: 6px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
            box-shadow: 0 2px 12px rgba(0,0,0,0.01);
            transition: transform 0.3s ease;
        }

        .company-card:hover {
            transform: translateY(-3px);
        }

        .company-avatar {
            width: 50px;
            height: 50px;
            background-color: var(--primary-color);
            color: var(--accent-color);
            font-family: var(--font-display);
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .company-meta h4 {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .company-tag {
            display: inline-block;
            font-size: 0.78rem;
            background-color: #e5dac6;
            color: var(--text-dark);
            padding: 2px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .company-meta p {
            font-size: 0.92rem;
            color: var(--text-muted);
        }

        /* 6. Application Form Section */
        .form-panel {
            max-width: 640px;
            margin: 0 auto;
            background-color: var(--surface-card);
            padding: 48px;
            border-radius: 8px;
            box-shadow: 0 12px 38px rgba(13, 30, 45, 0.04);
            border: 1px solid rgba(13, 30, 45, 0.04);
        }

        .form-panel h2 {
            font-family: var(--font-display);
            color: var(--primary-color);
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 34px;
        }

        .form-block {
            margin-bottom: 24px;
        }

        .form-block label {
            display: block;
            font-size: 0.92rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .input-item {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #cbbeaa;
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 0.98rem;
            transition: border-color 0.3s ease;
            color: var(--text-dark);
            background-color: #faf8f4;
        }

        .input-item:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
        }

        .tel-field {
            display: flex;
        }

        .tel-prefix {
            background-color: #e5dac6;
            border: 1.5px solid #cbbeaa;
            border-right: none;
            padding: 14px 16px;
            font-size: 0.98rem;
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
            color: var(--text-muted);
            user-select: none;
        }

        .tel-field .input-item {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        textarea.input-item {
            resize: vertical;
            min-height: 130px;
        }

        .error-lbl {
            color: #b32424;
            font-size: 0.82rem;
            margin-top: 6px;
            display: none;
        }

        .submit-trigger {
            width: 100%;
            background-color: var(--primary-color);
            color: #faf9f5;
            border: none;
            padding: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-trigger:hover {
            background-color: #050e17;
        }

        .success-box {
            display: none;
            background-color: #eaf2f8;
            border: 1px solid #a3c1da;
            color: #1a446c;
            padding: 18px;
            border-radius: 4px;
            text-align: center;
            font-weight: 500;
            margin-top: 22px;
        }

        /* 7. Footer */
        footer {
            background-color: var(--primary-color);
            color: #faf9f5;
            padding: 65px 0 35px 0;
            border-top: 4px solid var(--accent-color);
        }

        .footer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 26px;
            margin-bottom: 44px;
        }

        .footer-brand h3 {
            font-family: var(--font-display);
            font-size: 1.65rem;
            color: var(--accent-color);
            margin-bottom: 6px;
        }

        .footer-brand p {
            font-size: 0.88rem;
            color: #a4b6c5;
        }

        .footer-nav {
            display: flex;
            gap: 26px;
        }

        .footer-nav a {
            color: #a4b6c5;
            text-decoration: none;
            font-size: 0.94rem;
            transition: color 0.3s ease;
        }

        .footer-nav a:hover {
            color: var(--accent-color);
        }

        .footer-baseline {
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 26px;
            font-size: 0.84rem;
            color: #7d91a1;
        }

        /* Interaction & Transition Classes */
        .reveal-node {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, transform;
        }

        .reveal-node.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* Mobile Optimization and Viewport Modifiers */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.3rem; }
            .hero p { font-size: 1.15rem; }
            .section-title { font-size: 2.1rem; }
            
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%; left: 0; right: 0;
                background-color: var(--primary-color);
                padding: 26px;
                border
